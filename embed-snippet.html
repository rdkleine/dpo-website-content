<!--
  Embed-snippet voor club-assistent. Plak dit EENMALIG in het HTML-veld.
  Je hoeft dit nooit meer aan te passen: de afbeelding-versie wordt automatisch
  uit version.txt gelezen, zodat een nieuwe timetable altijd ververst.
-->
<div style="max-width:1170px;margin:0 auto">

  <!-- Afbeelding. De ?v= wordt hieronder automatisch gezet vanuit version.txt. -->
  <img
    id="dpo-timetable-img"
    src="https://rdkleine.github.io/dpo-website-content/program.png"
    alt="Timetable Dutch Pinball Open Expo"
    style="width:100%;height:auto;display:block" />

  <!-- Lijst in een afgeschermd iframe (XSS-veilig: sandbox ontneemt alle rechten). -->
  <!-- De ?v= wordt hieronder automatisch gezet vanuit version.txt. -->
  <iframe
    id="dpo-timetable-iframe"
    src="https://rdkleine.github.io/dpo-website-content/program.html"
    title="Schedule"
    loading="lazy"
    sandbox=""
    referrerpolicy="no-referrer"
    style="width:100%;height:1600px;border:0;margin-top:16px"></iframe>

</div>

<script>
// Leest de versie (platte tekst, bv. "20260602124937") en zet die als cache-buster
// op de afbeelding en het iframe. We zetten ALLEEN een src-attribuut; er wordt niets
// als HTML uitgevoerd, dus dit is geen XSS-vector.
(function () {
  var base = "https://rdkleine.github.io/dpo-website-content/";
  fetch(base + "version.txt", { cache: "no-store" })
    .then(function (r) { return r.ok ? r.text() : ""; })
    .then(function (v) {
      v = (v || "").trim();
      if (!/^[0-9]+$/.test(v)) return;            // alleen cijfers; anders niets doen
      var img = document.getElementById("dpo-timetable-img");
      if (img) img.src = base + "program.png?v=" + v;
      var iframe = document.getElementById("dpo-timetable-iframe");
      if (iframe) iframe.src = base + "program.html?v=" + v;
    })
    .catch(function () { /* offline/CDN-issue: toon gewoon de zonder-versie versie */ });
})();
</script>
